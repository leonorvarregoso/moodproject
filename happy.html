<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Happy</title>
    <link rel="stylesheet" href="happy.css">
    <script src="happy.js"></script>
</head>
<body>
<main>
    <h1>Paint the flower!</h1>
    <div class="canvas-area">

        <!-- coluna esquerda: outline -->
        <div class="color-panel" id="panel-outline">
            <span class="color-panel-label">pick the outline color</span>
            <div class="color-swatches" id="swatches-outline"></div>
        </div>

        <!-- flor -->
        <div class="flower-container"></div>

        <!-- coluna direita: fill -->
        <div class="color-panel" id="panel-fill">
            <span class="color-panel-label">pick your color</span>
            <div class="color-swatches" id="swatches-fill"></div>
        </div>

    </div>
</main>
</body>
</html>
