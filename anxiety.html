<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Anxious</title>
    <link rel="stylesheet" href="anxious.css">
</head>
<body>

<!-- ecrã inicial -->
<div id="screen-start">
    <h1>When you feel ready, press play</h1>
    <div id="play-btn">
        <img src="anxiety/play.svg" alt="play" />
    </div>
</div>

<!-- ecrã de respiração -->
<div id="screen-breathe" class="hidden">
    <div id="circle-wrapper">
        <img src="anxiety/circle.svg" alt="breathe" id="breathe-circle" />
        <span id="breathe-label">breath in</span>
    </div>
    <div id="stop-btn">
        <img src="anxiety/stop.svg" alt="stop" />
    </div>
</div>

<script src="anxious.js"></script>
</body>
</html>
